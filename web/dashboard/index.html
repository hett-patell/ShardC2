<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShardC2 // OPERATOR</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="login-screen">
    <div class="scanlines"></div>
    <div class="login-box">
      <div class="login-logo-wrap">
        <div class="glitch-logo" data-text="SHARDC2">SHARDC2</div>
        <div class="login-tagline">COMMAND &amp; CONTROL</div>
      </div>
      <div class="login-divider"></div>
      <div class="login-form">
        <div class="input-wrap">
          <span class="input-prefix">USER://</span>
          <input type="text" id="login-user" placeholder="username" autofocus>
        </div>
        <div class="input-wrap">
          <span class="input-prefix">PASS://</span>
          <input type="password" id="login-pass" placeholder="password">
        </div>
        <button id="login-btn" onclick="app.login()">
          <span class="btn-inner">AUTHENTICATE</span>
        </button>
      </div>
      <p id="login-error" class="error-msg"></p>
      <div class="login-footer">AUTHORIZED PERSONNEL ONLY</div>
    </div>
  </div>

  <div id="app" class="hidden">
    <div class="scanlines scanlines-subtle"></div>
    <nav id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">SHARD<span class="logo-accent">C2</span></div>
        <div class="sidebar-version">v0.2.0 // OPERATOR PANEL</div>
      </div>
      <div class="nav-links">
        <a href="#" data-page="dashboard" class="nav-link active">
          <span class="nav-icon">&#9632;</span>
          <span>OVERVIEW</span>
          <span class="nav-arrow">&rsaquo;</span>
        </a>
        <a href="#" data-page="bots" class="nav-link">
          <span class="nav-icon">&#9654;</span>
          <span>IMPLANTS</span>
          <span class="nav-arrow">&rsaquo;</span>
        </a>
        <a href="#" data-page="terminal" class="nav-link">
          <span class="nav-icon">&gt;_</span>
          <span>TERMINAL</span>
          <span class="nav-arrow">&rsaquo;</span>
        </a>
        <a href="#" data-page="credentials" class="nav-link">
          <span class="nav-icon">&#9670;</span>
          <span>CREDENTIALS</span>
          <span class="nav-arrow">&rsaquo;</span>
        </a>
        <a href="#" data-page="campaigns" class="nav-link">
          <span class="nav-icon">&#9733;</span>
          <span>CAMPAIGNS</span>
          <span class="nav-arrow">&rsaquo;</span>
        </a>
        <a href="#" data-page="files" class="nav-link">
          <span class="nav-icon">&#9776;</span>
          <span>FILES</span>
          <span class="nav-arrow">&rsaquo;</span>
        </a>
        <a href="#" data-page="settings" class="nav-link" style="display:none">
          <span class="nav-icon">&#9881;</span>
          <span>SETTINGS</span>
          <span class="nav-arrow">&rsaquo;</span>
        </a>
      </div>
      <div class="sidebar-footer">
        <div id="conn-status" class="status-indicator">
          <span class="pulse-dot"></span>
          <span>LINK ACTIVE</span>
        </div>
        <button class="btn-logout" onclick="app.logout()">
          &#x2715; DISCONNECT
        </button>
      </div>
    </nav>
    <main id="content"></main>
  </div>

  <script src="js/app.js?v=8"></script>
</body>
</html>
